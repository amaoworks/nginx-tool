name: ci

on:
  push:
    paths:
      - 'tui-next/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'tui-next/**'
      - '.github/workflows/ci.yml'

# 注意：本工作流位于 tui-next/.github/，作为子项目级文档；GitHub 实际生效需将
# .github/ 目录提到仓库根。当前仓库根尚未启用 GitHub Actions。

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tui-next/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tui-next/Cargo.lock', 'tui-next/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  build-aarch64:
    name: cross-compile aarch64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build aarch64 release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ngtool-aarch64
          path: tui-next/target/aarch64-unknown-linux-gnu/release/ngtool
