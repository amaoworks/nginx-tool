name: release

# 只在推送 v* tag 时触发出包。
#   git tag v0.1.0 && git push origin v0.1.0
#
# 注：当前 Forgejo 实例不渲染 workflow_dispatch inputs（无输入框），
# 且 actions/{upload,download}-artifact@v4 在 Forgejo 上被识别为 GHES 不支持，
# 因此本工作流不跨 job 传产物，每个矩阵 job 直接把二进制推到 release。
on:
  push:
    tags:
      - 'v*'

# 创建/更新 release 需要写权限。Forgejo 会按这里声明的权限给 GITHUB_TOKEN 授权。
permissions:
  contents: write

env:
  PROJECT_DIR: tui-next
  BIN_NAME: ngtool
  ZIG_VERSION: '0.13.0'

jobs:
  build-and-publish:
    name: build ${{ matrix.arch }} & upload to release
    runs-on: docker
    strategy:
      # 串行而非并行：两个 job 同时 find-or-create release 在 Forgejo 上偶发竞态；
      # 一个跑完再跑下一个最稳。出错也不影响另一个继续。
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # docker runner 默认镜像（如 node:20-bullseye）通常缺这些工具：
      #   xz/tar 解压 zig、file/binutils 校验产物、build-essential 给 cargo install
      #   编译 native build script 用、jq 给后面调 Forgejo API 解析 JSON 用。
      - name: Prep runner
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(id -u)" -ne 0 ] && command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          elif [ "$(id -u)" -eq 0 ]; then
            SUDO=
          else
            echo "::error::非 root 且无 sudo，无法安装系统包"
            exit 1
          fi
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends \
              ca-certificates curl xz-utils tar file \
              build-essential pkg-config jq git
          else
            echo "::warning::非 Debian/Ubuntu 镜像，跳过系统包安装；后续步骤如失败请手动调整 runner 镜像"
          fi

      - name: Resolve tag / version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          case "${TAG}" in
            v*) ;;
            *) echo "::error::tag 必须以 v 开头，收到 ${TAG}" >&2; exit 1 ;;
          esac
          VERSION="${TAG#v}"
          echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"
          echo "解析得到 tag=${TAG} version=${VERSION}"

      # 不用 dtolnay/rust-toolchain：当前 Forgejo runner 的 action 镜像源
      # (data.forgejo.org) 只镜像 actions/* 官方仓库，第三方 action 拉不到。
      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version
          cargo --version

      # zig 当 C 链接器，cargo-zigbuild 一行命令搞定 musl 交叉编译。
      - name: Install zig
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | tar -xJ
          echo "${PWD}/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('tui-next/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Cache cargo-zigbuild binary
        id: cache-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-v0.19

      - name: Install cargo-zigbuild
        if: steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-zigbuild --version 0.19.5

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_DIR }}/target
          key: build-${{ matrix.target }}-${{ hashFiles('tui-next/Cargo.lock') }}
          restore-keys: |
            build-${{ matrix.target }}-

      - name: Build (release, musl static)
        working-directory: ${{ env.PROJECT_DIR }}
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Verify binary
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${BIN_NAME}"
          ls -lh "${BIN}"
          if command -v file >/dev/null 2>&1; then
            file "${BIN}"
          fi
          if command -v ldd >/dev/null 2>&1; then
            if ldd "${BIN}" 2>&1 | grep -qE 'not a dynamic executable|statically linked'; then
              echo "OK: 静态链接"
            else
              echo "::warning::ldd 输出非预期，请确认是否真的是静态链接："
              ldd "${BIN}" || true
            fi
          else
            echo "::notice::ldd 不可用，跳过静态链接校验"
          fi

      - name: Stage binary
        id: pkg
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          ASSET="${BIN_NAME}-${{ steps.meta.outputs.version }}-linux-${{ matrix.arch }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${ASSET}"
          chmod +x "dist/${ASSET}"
          ls -lh dist/
          echo "name=${ASSET}" >> "$GITHUB_OUTPUT"

      # 直接调 Forgejo API（与 Gitea API 兼容）上传到当前 tag 的 release。
      # find-or-create 是幂等的：同 tag 重跑会复用已有 release，同名 asset 先删后传。
      # max-parallel: 1 保证两个 arch 串行，不会撞 release 创建竞态。
      - name: Upload to Forgejo release
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          ASSET: ${{ steps.pkg.outputs.name }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="${GITHUB_SERVER_URL%/}/api/v1/repos/${GITHUB_REPOSITORY}"
          AUTH=( -H "Authorization: token ${TOKEN}" )

          echo "API base: ${API}"
          echo "TAG:      ${TAG}"
          echo "ASSET:    ${ASSET}"

          # 1) find-or-create release
          HTTP=$(curl -sS -o /tmp/release.json -w '%{http_code}' \
            "${AUTH[@]}" "${API}/releases/tags/${TAG}" || true)
          if [ "${HTTP}" = "200" ]; then
            RELEASE_ID=$(jq -r '.id' /tmp/release.json)
            echo "复用已有 release id=${RELEASE_ID}"
          elif [ "${HTTP}" = "404" ]; then
            echo "创建新 release（基于 ${GITHUB_SHA}）"
            BODY=$(jq -nc \
              --arg tag "${TAG}" \
              --arg target "${GITHUB_SHA}" \
              --arg name "${TAG}" \
              '{tag_name:$tag, target_commitish:$target, name:$name, draft:false, prerelease:false, body:"Automated release built by Forgejo Actions."}')
            curl -fsSL -X POST "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              -d "${BODY}" \
              "${API}/releases" -o /tmp/release.json
            RELEASE_ID=$(jq -r '.id' /tmp/release.json)
            echo "创建 release id=${RELEASE_ID}"
          else
            echo "::error::查询 release 失败: HTTP ${HTTP}"
            cat /tmp/release.json || true
            exit 1
          fi

          # 2) 同名先删后传，保证重跑幂等
          curl -fsSL "${AUTH[@]}" "${API}/releases/${RELEASE_ID}/assets" -o /tmp/assets.json
          OLD_ID=$(jq -r --arg n "${ASSET}" '.[] | select(.name==$n) | .id' /tmp/assets.json | head -n1)
          if [ -n "${OLD_ID}" ] && [ "${OLD_ID}" != "null" ]; then
            echo "删除旧 asset ${ASSET} (id=${OLD_ID})"
            curl -fsSL -X DELETE "${AUTH[@]}" \
              "${API}/releases/${RELEASE_ID}/assets/${OLD_ID}"
          fi

          echo "上传 ${ASSET}"
          curl -fsSL -X POST "${AUTH[@]}" \
            -F "attachment=@dist/${ASSET};filename=${ASSET}" \
            "${API}/releases/${RELEASE_ID}/assets?name=${ASSET}" >/dev/null

          echo ""
          echo "✓ ${ASSET} 已发布到 ${TAG}"
          echo "URL: ${GITHUB_SERVER_URL%/}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
